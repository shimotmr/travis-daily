name: Visual Regression Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install visual testing tools
        run: |
          npm install -D playwright pngjs pixelmatch
          npx playwright install chromium
        
      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://eznawjbgzmcnkxcisrjj.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6bmF3amJnem1jbmt4Y2lzcmpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNTkxMTUsImV4cCI6MjA4NTczNTExNX0.KrZbgeF5z76BTjOPvBTxRkuEt_OqpmgsqMAd60wA1J0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6bmF3amJnem1jbmt4Y2lzcmpqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MDE1OTExNSwiZXhwIjoyMDg1NzM1MTE1fQ.6545BenNIryXu9MlT6fDf1EkPC_VdJSQBl3EQioNodI
        
      - name: Start development server
        run: |
          npm run dev &
          echo $! > dev-server.pid
          # 等待伺服器啟動
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "伺服器已啟動"
              break
            fi
            echo "等待伺服器... ($i/30)"
            sleep 2
          done
        
      - name: Restore baseline screenshots
        uses: actions/cache@v4
        with:
          path: |
            .visual-regression/baseline
          key: visual-baseline-${{ github.ref_name }}
          restore-keys: |
            visual-baseline-main
        
      - name: Run visual regression tests
        env:
          PROJECT: travis-daily
        run: |
          mkdir -p .visual-regression/{baseline,current,diff}
          node scripts/screenshot-diff.js || true
        continue-on-error: true
        
      - name: Save baseline screenshots
        if: github.ref == 'refs/heads/main'
        uses: actions/cache@v4
        with:
          path: |
            .visual-regression/baseline
          key: visual-baseline-${{ github.ref_name }}-${{ github.sha }}
        
      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            .visual-regression/current/*.png
            .visual-regression/diff/*.png
            .visual-regression/report-*.json
          retention-days: 7
        
      - name: Upload results to Supabase
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # 上傳視覺回歸測試結果到 Supabase
          node scripts/upload-visual-regression-results.js
        
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportFiles = fs.readdirSync('.visual-regression')
              .filter(f => f.startsWith('report-') && f.endsWith('.json'));
            
            if (reportFiles.length === 0) {
              console.log('無報告檔案');
              return;
            }
            
            const report = JSON.parse(
              fs.readFileSync(`.visual-regression/${reportFiles[0]}`, 'utf8')
            );
            
            const changed = report.results.filter(r => r.status === 'changed');
            
            let comment = '## 📸 Visual Regression Test Results\n\n';
            comment += `- Total Screenshots: ${report.total_screenshots}\n`;
            comment += `- Changed: ${report.total_diffs}\n`;
            comment += `- Duration: ${(report.duration_ms / 1000).toFixed(1)}s\n\n`;
            
            if (changed.length > 0) {
              comment += '### ⚠️ Visual Changes Detected\n\n';
              changed.forEach(r => {
                comment += `- **${r.filename}**: ${r.diff.toFixed(3)}% different\n`;
              });
            } else {
              comment += '### ✅ No Visual Changes\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        
      - name: Stop development server
        if: always()
        run: |
          if [ -f dev-server.pid ]; then
            kill $(cat dev-server.pid) || true
            rm dev-server.pid
          fi
